<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversões de Unidades</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="main-container">
        <h1 class="main-title">Conversões Online</h1>
        
        <div class="converter-box">
            <h2>Conversor de Unidades</h2>
            <p class="subtitle">(Centímetros para metros)</p>

            <div class="input-group">
                <label for="centimetrosInput">Unidade em Centímetros</label>
                <input type="number" id="centimetrosInput" placeholder="Ex: 300" oninput="converter_centimetros_para_metros()">
            </div>

            <div class="result-display">
                <div class="result-label">Resultado em metros:</div>
                <div class="result-value" id="metrosResult">0 M</div>
            </div>

            <div class="navigation-area">

                <div class="btn-grid">
                    <button class="btn-nav active" onclick="irParaPagina2()">🌡️ temperatura</button>
                    <button class="btn-nav active" onclick="irParaPagina3()">🪙 Moedas</button>
                    <button class="btn-nav active" onclick="irParaPagina4()">⏰ Tempo</button>

                </div>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
